<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohr's Circle — Step-by-Step Guide</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0f0f13; color: #e8e6e0;
        font-family: "Segoe UI", system-ui, sans-serif;
        padding: 14px; min-height: 100vh;
      }
      .top-bar { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
      h1 { font-size: 15px; font-weight: 600; color: #c8c5bc; }
      .prob-bar {
        font-size: 11px; color: #5a5752; margin-bottom: 10px; line-height: 1.7;
        background: #141318; border: 1px solid #1e1d1a; border-radius: 7px; padding: 8px 12px;
      }
      .prob-bar b { color: #9a9790; }
      .val { color: #7eb8f0; }

      .steps-row { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin-bottom:8px; }
      .step-btn {
        font-size:10px; padding:5px 10px; border-radius:6px;
        border:1px solid #2e2d2a; background:#1a1917; color:#666;
        cursor:pointer; font-family:inherit; transition: all .15s; white-space: nowrap;
      }
      .step-btn:hover { background:#222; color:#bbb; }
      .step-btn.active { background:#1c2a3a; color:#7eb8f0; border-color:#2d4d7a; }
      .step-btn.done { color:#3a5a7a; border-color:#1e2d3d; }

      .progress-bar { height:3px; background:#1a1917; border-radius:2px; margin-bottom:10px; }
      .progress-fill { height:100%; background:#7eb8f0; border-radius:2px; transition: width .4s ease; }

      .main-area { display:flex; gap:12px; align-items:flex-start; justify-content:center; flex-wrap: wrap; }
      canvas { display:block; border-radius:10px; background:#141318; border:1px solid #222028; flex-shrink:0; }

      .panel { flex:1; min-width: 260px; max-width: 460px; }
      .explain-box { background:#141318; border:1px solid #222028; border-radius:8px; padding:11px; margin-bottom:7px; min-height: 130px; }
      .ex-title { font-size:10px; font-weight:600; color:#7eb8f0; margin-bottom:6px; letter-spacing:0.05em; text-transform:uppercase; }
      .ex-body { font-size:11.5px; color:#b0ada6; line-height:1.75; }
      .ex-body b { color:#e0ddd8; }
      .ex-body .f { display:block; margin:4px 0; background:#1a1917; border-radius:4px; padding:4px 8px; font-family:monospace; font-size:11px; color:#c8c5bc; border-left:2px solid #7eb8f0; }
      .ex-body .w { color:#c9a84c; font-style:italic; display:block; margin-top:5px; font-size:11px; }
      .ex-body .g { color:#7ec87e; font-style:italic; display:block; margin-top:5px; font-size:11px; }

      .vals-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:7px; }
      .vc { background:#1a1917; border:1px solid #252320; border-radius:6px; padding:6px 9px; }
      .vl { font-size:9px; color:#5a5752; text-transform:uppercase; letter-spacing:.04em; margin-bottom:1px; }
      .vv { font-size:12px; font-weight:500; color:#c8c5bc; }
      .vv.blue { color:#7eb8f0; } .vv.green { color:#7ec87e; } .vv.amber { color:#c9a84c; }

      .nav-row { display:flex; gap:8px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
      button.nav, .back-btn {
        font-size:12px; padding:7px 16px; border-radius:7px;
        border:1px solid #2e2d2a; background:#1a1917; color:#b0ada6;
        cursor:pointer; font-family:inherit; transition: all .15s; text-decoration:none;
        display:inline-flex; align-items:center; gap:5px;
      }
      .back-btn { background:#1c2d1c; color:#7ec87e; border-color:#3d5d3d; }
      button.nav:hover { background:#252320; }
      button.nav.primary { background:#1c2a3a; color:#7eb8f0; border-color:#2d4d7a; }
      button.nav:disabled { opacity:.3; cursor:default; }

      .substep { font-size:10px; color:#5a5752; margin-top:4px; text-align:center; }
      .substep b { color:#7eb8f0; }
    </style>
  </head>
  <body>
    <div class="top-bar"><h1>Mohr's Circle — Step-by-Step Guide</h1></div>
    <div class="prob-bar" id="probBar">Loading…</div>
    <div class="steps-row" id="stepBtns"></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>

    <div class="main-area">
      <canvas id="cv" width="460" height="430"></canvas>
      <div class="panel">
        <div class="explain-box">
          <div class="ex-title" id="exTitle">—</div>
          <div class="ex-body" id="exBody">—</div>
        </div>
        <div class="vals-grid">
          <div class="vc"><div class="vl">Centre C (σavg)</div><div class="vv blue" id="iv-c">—</div></div>
          <div class="vc"><div class="vl">Radius R (τmax)</div><div class="vv blue" id="iv-r">—</div></div>
          <div class="vc"><div class="vl">σ₁</div><div class="vv green" id="iv-s1">—</div></div>
          <div class="vc"><div class="vl">σ₂</div><div class="vv green" id="iv-s2">—</div></div>
          <div class="vc"><div class="vl">θp1</div><div class="vv amber" id="iv-tp">—</div></div>
          <div class="vc"><div class="vl">θs1</div><div class="vv amber" id="iv-ts">—</div></div>
        </div>
        <div class="substep" id="subText"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="back-btn" onclick="window.close()">← Back to Analyzer</button>
      <button class="nav" id="btnPrev" onclick="prev()">← Back</button>
      <button class="nav primary" id="btnNext" onclick="next()">Next →</button>
      <button class="nav" id="btnReplay" onclick="replay()">↻ Replay</button>
      <button class="nav" id="btnAuto" onclick="autoPlay()">▶ Auto-play</button>
    </div>

    <script>
      // ── Inputs (URL → fallback localStorage → defaults) ───────────────
      const params = new URLSearchParams(window.location.search);
      function _get(k, d) {
        const v = params.get(k);
        if (v !== null && v !== "") return parseFloat(v);
        try { const ls = localStorage.getItem("stress_i" + k); if (ls !== null) return parseFloat(ls); } catch(e){}
        return d;
      }
      const SX = _get("sx", 20), SY = _get("sy", 10), TXY = _get("txy", 10);

      // ── Compute ───────────────────────────────────────────────────────
      const AVG = (SX + SY) / 2;
      const R = Math.sqrt(((SX - SY) / 2) ** 2 + TXY ** 2);
      const S1 = AVG + R, S2 = AVG - R;
      const tp_raw = (0.5 * Math.atan2(2 * TXY, SX - SY) * 180) / Math.PI;
      function snAt(d) {
        const t = (d * Math.PI) / 180;
        return AVG + ((SX - SY) / 2) * Math.cos(2*t) + TXY * Math.sin(2*t);
      }
      const tA = tp_raw, tB = tp_raw + (tp_raw <= 0 ? 90 : -90);
      const TP1_signed = Math.abs(snAt(tA) - S1) < Math.abs(snAt(tB) - S1) ? tA : tB; // signed in (-90,90]
      const TP1 = TP1_signed; // keep signed for direction clarity
      const TP2 = TP1 + (TP1 <= 0 ? 90 : -90);
      const TS_a = TP1 - 45, TS_b = TP1 + 45;
      const TS1 = Math.abs(TS_a) < Math.abs(TS_b) ? TS_a : TS_b;

      // 2θp on Mohr's circle: angle from A (x-face) to σ1 point, with τ-down convention.
      // A is at (SX, TXY); from centre vector (SX-AVG, TXY) = ((SX-SY)/2, TXY). σ1 is at angle 0 (right of C).
      // Sweep from A to σ1 going CCW screen if A is below axis (TXY>0 in τ-down means y>CY).
      // 2θ_real (signed) = -angle_of_A_on_screen.  i.e. 2θ = -atan2(TXY, (SX-SY)/2)
      const TWO_THETA_P = -Math.atan2(TXY, (SX - SY) / 2) * 180 / Math.PI;
      // This matches TP1*2 in sign and magnitude (mod 180). Use it for the arc on Mohr.

      // ── Header ────────────────────────────────────────────────────────
      document.getElementById("probBar").innerHTML =
        `σx=<b class="val">${SX}</b>, σy=<b class="val">${SY}</b>, τxy=<b class="val">${TXY}</b> MPa &nbsp;|&nbsp;
   σavg=<b class="val">${AVG.toFixed(3)}</b>, R=τmax=<b class="val">${R.toFixed(3)}</b>,
   σ₁=<b class="val">${S1.toFixed(3)}</b>, σ₂=<b class="val">${S2.toFixed(3)}</b>,
   θp1=<b class="val">${TP1.toFixed(3)}°</b>, θs1=<b class="val">${TS1.toFixed(3)}°</b>`;

      document.getElementById("iv-c").textContent  = AVG.toFixed(3) + " MPa";
      document.getElementById("iv-r").textContent  = R.toFixed(3)   + " MPa";
      document.getElementById("iv-s1").textContent = S1.toFixed(3)  + " MPa";
      document.getElementById("iv-s2").textContent = S2.toFixed(3)  + " MPa";
      document.getElementById("iv-tp").textContent = TP1.toFixed(3) + "°";
      document.getElementById("iv-ts").textContent = TS1.toFixed(3) + "°";

      // ── Canvas ────────────────────────────────────────────────────────
      const cv = document.getElementById("cv");
      const ctx = cv.getContext("2d");
      const W = 460, H = 430;
      const CX = W * 0.50, CY = H * 0.50;
      const allSigma = [SX, SY, S1, S2, AVG, 0];
      const span = Math.max(Math.abs(S1 - AVG), Math.abs(S2 - AVG), R, 1);
      const SCALE = Math.min((W * 0.36) / span, (H * 0.36) / Math.max(R, 1));

      const wx = s => CX + (s - AVG) * SCALE;
      const wy = t => CY + t * SCALE;

      // World positions
      const Ax = wx(SX), Ay = wy(TXY);
      const Bx = wx(SY), By = wy(-TXY);
      const Ccx = wx(AVG), Ccy = CY;
      const Rcv = R * SCALE;
      const s1x = wx(S1), s2x = wx(S2);

      // Angle of A from centre (screen radians)
      const angA  = Math.atan2(Ay - Ccy, Ax - Ccx);
      const angB  = angA + Math.PI;
      const angS1 = 0;
      const angS2 = Math.PI;

      // ── Drawing helpers ───────────────────────────────────────────────
      function arrow(x1,y1,x2,y2,col,lw){
        lw=lw||1.5; const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy); if(len<3) return;
        const ux=dx/len, uy=dy/len;
        ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=lw; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2-ux*8, y2-uy*8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x2,y2);
        ctx.lineTo(x2-ux*8-uy*4, y2-uy*8+ux*4);
        ctx.lineTo(x2-ux*8+uy*4, y2-uy*8-ux*4);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      function dot(x,y,r,col){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill(); }
      function ring(x,y,r,col,lw){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.strokeStyle=col; ctx.lineWidth=lw||1; ctx.stroke(); }
      function lab(x,y,t,col,sz,al,bl){
        ctx.fillStyle=col||"#c8c5bc";
        ctx.font=(sz||10)+"px Segoe UI,system-ui";
        ctx.textAlign=al||"center"; ctx.textBaseline=bl||"middle";
        ctx.fillText(t,x,y);
      }
      function blab(x,y,t,col,sz,al,bl){
        ctx.fillStyle=col||"#e0ddd8";
        ctx.font="bold "+(sz||10)+"px Segoe UI,system-ui";
        ctx.textAlign=al||"center"; ctx.textBaseline=bl||"middle";
        ctx.fillText(t,x,y);
      }
      // Text with subtle background for legibility
      function tagLab(x,y,t,col,sz,al,bl){
        ctx.font="bold "+(sz||10)+"px Segoe UI,system-ui";
        const w = ctx.measureText(t).width + 6, h = (sz||10) + 4;
        let tx = x;
        if((al||"center")==="left") tx = x;
        else if(al==="right") tx = x - w;
        else tx = x - w/2;
        let ty = y - h/2;
        if(bl==="top") ty = y; else if(bl==="bottom") ty = y - h;
        ctx.fillStyle = "rgba(20,19,24,0.78)";
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(tx,ty,w,h,3) : ctx.rect(tx,ty,w,h);
        ctx.fill();
        ctx.fillStyle = col || "#e0ddd8";
        ctx.textAlign = al||"center"; ctx.textBaseline = bl||"middle";
        ctx.fillText(t, x, y);
      }

      // Radial label position outside circle (avoids overlap)
      function radialLabelPos(angle, extra){
        extra = extra || 16;
        const r = Rcv + extra;
        const lx = Ccx + r * Math.cos(angle);
        const ly = Ccy + r * Math.sin(angle);
        // text alignment based on quadrant
        const al = Math.cos(angle) > 0.2 ? "left" : Math.cos(angle) < -0.2 ? "right" : "center";
        return { x: lx, y: ly, al };
      }

      function drawAxes(progress){
        // progress 0..1 — extend arrows
        progress = progress==null ? 1 : Math.min(1,Math.max(0,progress));
        ctx.clearRect(0,0,W,H);
        // grid
        ctx.strokeStyle="#1a1a22"; ctx.lineWidth=0.5;
        for(let x=0;x<W;x+=30){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for(let y=0;y<H;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        // σ axis growing left-to-right
        const xEnd = 18 + (W-32) * progress;
        arrow(18, CY, xEnd, CY, "#3a3a50", 1);
        if(progress >= 0.95) blab(W-10, CY-4, "σ", "#7a7a90", 12, "left", "bottom");
        // τ axis growing top-down (positive τ downward)
        const yEnd = 16 + (H-30) * progress;
        arrow(CX, 16, CX, yEnd, "#3a3a50", 1);
        if(progress >= 0.95){
          blab(CX+5, 14, "τ", "#7a7a90", 12, "left", "top");
          // small "+" indicator on downward direction
          lab(CX+8, H-22, "+τ", "#5a5a70", 9, "left");
        }
        lab(CX-8, CY-8, "0", "#3a3a50", 9);
      }

      function drawDashLine(x1,y1,x2,y2,col,prog){
        prog = prog==null?1:prog;
        const ex = x1 + (x2-x1)*prog, ey = y1 + (y2-y1)*prog;
        ctx.save(); ctx.setLineDash([4,3]); ctx.strokeStyle=col; ctx.lineWidth=0.9;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.restore();
      }
      function drawSolidLine(x1,y1,x2,y2,col,lw,prog){
        prog = prog==null?1:prog;
        const ex = x1 + (x2-x1)*prog, ey = y1 + (y2-y1)*prog;
        ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=lw||1;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.restore();
      }
      // Draw circle as if traced by hand from start angle
      function drawCirclePath(cx,cy,r,startA,prog,col,lw,fillCol){
        prog = Math.min(1,Math.max(0,prog));
        const sweep = Math.PI*2 * prog;
        if(fillCol && prog > 0.99){
          ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
          ctx.fillStyle = fillCol; ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(cx, cy, r, startA, startA + sweep);
        ctx.strokeStyle = col; ctx.lineWidth = lw||1.6; ctx.lineCap="round";
        ctx.stroke();
        // pen tip
        if(prog > 0 && prog < 1){
          const px = cx + r*Math.cos(startA + sweep);
          const py = cy + r*Math.sin(startA + sweep);
          dot(px, py, 3.2, col);
        }
      }
      // Pop-in dot (scale 0→1.4→1)
      function popDot(x,y,baseR,col,prog){
        if(prog<=0) return;
        let s = prog<0.6 ? prog/0.6 * 1.4 : 1.4 - (prog-0.6)/0.4 * 0.4;
        dot(x,y, baseR*s, col);
      }
      // Animated arc sweep
      function sweepArc(cx,cy,r,a1,a2,col,lw,prog){
        prog = Math.min(1,Math.max(0,prog));
        const a = a1 + (a2-a1)*prog;
        ctx.save(); ctx.setLineDash([3,2]);
        ctx.strokeStyle=col; ctx.lineWidth=lw||1.5;
        ctx.beginPath();
        // direction
        ctx.arc(cx,cy,r, a1, a, (a2 < a1));
        ctx.stroke();
        ctx.restore();
      }

      // ── Step definitions: each has phases for animation ───────────────
      // Each step has duration (ms) and a `paint(t)` where t ∈ [0,1]
      const STEPS = [
        {
          title: "Step 1 — Set up the axes (τ-down convention)",
          dur: 1200,
          body: () => `Draw two perpendicular axes:<br>
<b>Horizontal (→)</b>: normal stress σ. Right is positive (tension).<br>
<b>Vertical (↓)</b>: shear stress τ. <b>Positive τ plotted downward</b>.<br><br>
This makes rotations on the circle go in the <b>same screen direction</b> as on the real element. Every point on the circle = one orientation.
<span class="w">Convention varies. We use τ-down so rotation directions match the physical element.</span>`,
          subs: ["Drawing σ axis","Drawing τ axis","Axes ready"],
          paint: (t) => {
            // 0..0.45: σ axis,  0.45..0.9: τ axis, 0.9..1: settle
            const pσ = Math.min(1, t/0.45);
            const pτ = Math.min(1, Math.max(0,(t-0.45)/0.45));
            ctx.clearRect(0,0,W,H);
            // grid
            ctx.strokeStyle="#1a1a22"; ctx.lineWidth=0.5;
            for(let x=0;x<W;x+=30){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
            for(let y=0;y<H;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
            arrow(18, CY, 18 + (W-32)*pσ, CY, "#3a3a50", 1);
            if(pσ>0.9) blab(W-10, CY-4, "σ", "#7a7a90", 12, "left","bottom");
            arrow(CX, 16, CX, 16 + (H-30)*pτ, "#3a3a50", 1);
            if(pτ>0.9){
              blab(CX+5, 14, "τ", "#7a7a90", 12, "left", "top");
              lab(CX+8, H-22, "+τ (down)", "#5a5a70", 9, "left");
            }
            lab(CX-8, CY-8, "0", "#3a3a50", 9);
          }
        },
        {
          title: "Step 2 — Plot Point A: the x-face (σx, τxy)",
          dur: 1800,
          body: () => `Coordinates: <b>A = (${SX}, ${TXY})</b>.<br>
Represents the +x face: σ on x = <b>${SX}</b>, τ on x = <b>${TXY}</b> (${TXY>=0?"plotted downward":"plotted upward"}).<br><br>
1️⃣ Move along σ-axis to ${SX}.<br>
2️⃣ Move ${TXY>=0?"down":"up"} by ${Math.abs(TXY)}.<br>
3️⃣ Drop the point.
<span class="g">A is your anchor — every other angle is measured from here.</span>`,
          subs: ["Move along σ","Move along τ","Plot A"],
          paint: (t) => {
            drawAxes(1);
            // 0..0.4 horizontal guide grows, 0.4..0.75 vertical guide grows, 0.75..1 dot pops
            const ph = Math.min(1, t/0.4);
            const pv = Math.min(1, Math.max(0,(t-0.4)/0.35));
            const pd = Math.min(1, Math.max(0,(t-0.75)/0.25));
            // moving cursor along axes
            drawDashLine(CX, CY, Ax, CY, "#2a3a2a", ph);
            if(ph>=1){
              drawDashLine(Ax, CY, Ax, Ay, "#2a3a2a", pv);
            }
            // tick on σ axis
            if(ph>0.05){
              ctx.strokeStyle="#5a8a5a"; ctx.lineWidth=1;
              ctx.beginPath(); ctx.moveTo(Ax, CY-4); ctx.lineTo(Ax, CY+4); ctx.stroke();
              lab(Ax, CY+(TXY>=0?-10:14), `σx=${SX}`, "#7ec87e", 9);
            }
            if(pd>0){
              popDot(Ax, Ay, 5, "#7ec87e", pd);
              if(pd>0.5){
                const al = SX>=AVG?"left":"right";
                const ox = SX>=AVG?9:-9;
                tagLab(Ax+ox, Ay, `A(${SX}, ${TXY})`, "#7ec87e", 9.5, al);
              }
            }
          }
        },
        {
          title: "Step 3 — Plot Point B: the y-face (σy, −τxy)",
          dur: 1800,
          body: () => `Coordinates: <b>B = (${SY}, ${-TXY})</b>.<br>
On the +y face the shear sign flips (moment equilibrium): τ becomes <b>−τxy = ${-TXY}</b>.<br><br>
A and B are <b>diametrically opposite</b> — perpendicular faces in reality (90°) become opposite ends on Mohr's circle (180°).
<span class="w">Always check: A and B sit on opposite sides of the σ-axis when τxy ≠ 0.</span>`,
          subs: ["Move along σ","Move along τ","Plot B"],
          paint: (t) => {
            drawAxes(1);
            // keep A
            dot(Ax, Ay, 5, "#7ec87e");
            tagLab(Ax+(SX>=AVG?9:-9), Ay, "A", "#7ec87e", 9.5, SX>=AVG?"left":"right");
            const ph = Math.min(1, t/0.4);
            const pv = Math.min(1, Math.max(0,(t-0.4)/0.35));
            const pd = Math.min(1, Math.max(0,(t-0.75)/0.25));
            drawDashLine(CX, CY, Bx, CY, "#3a2a2a", ph);
            if(ph>=1) drawDashLine(Bx, CY, Bx, By, "#3a2a2a", pv);
            if(ph>0.05){
              ctx.strokeStyle="#8a5a5a"; ctx.lineWidth=1;
              ctx.beginPath(); ctx.moveTo(Bx, CY-4); ctx.lineTo(Bx, CY+4); ctx.stroke();
              lab(Bx, CY+(-TXY>=0?-10:14), `σy=${SY}`, "#e06060", 9);
            }
            if(pd>0){
              popDot(Bx, By, 5, "#e06060", pd);
              if(pd>0.5){
                const al = SY>=AVG?"left":"right";
                const ox = SY>=AVG?9:-9;
                tagLab(Bx+ox, By, `B(${SY}, ${-TXY})`, "#e06060", 9.5, al);
              }
            }
          }
        },
        {
          title: "Step 4 — Diameter A→B and centre C",
          dur: 2000,
          body: () => `Connect A and B — that line is a <b>diameter</b>. Its midpoint = <b>centre C</b>, always on the σ-axis.<br>
<span class="f">C = (σavg, 0) = ((${SX}+${SY})/2, 0) = (${AVG.toFixed(3)}, 0)</span>
<span class="f">R = √[((${SX}−${SY})/2)² + (${TXY})²] = ${R.toFixed(3)} MPa</span>
R = τmax (max shear at this point).
<span class="g">C is invariant — rotate the element however you like, σavg never changes.</span>`,
          subs: ["Draw diameter","Find midpoint C","Mark radius R"],
          paint: (t) => {
            drawAxes(1);
            // re-plot A,B
            dot(Ax, Ay, 5, "#7ec87e"); tagLab(Ax+(SX>=AVG?9:-9), Ay, "A", "#7ec87e", 9.5, SX>=AVG?"left":"right");
            dot(Bx, By, 5, "#e06060"); tagLab(Bx+(SY>=AVG?9:-9), By, "B", "#e06060", 9.5, SY>=AVG?"left":"right");
            // 0..0.5 diameter grows
            const pd = Math.min(1, t/0.5);
            drawSolidLine(Ax, Ay, Bx, By, "#5a5a70", 1.4, pd);
            // 0.5..0.75 C dot pop
            const pc = Math.min(1, Math.max(0,(t-0.5)/0.25));
            if(pc>0){
              popDot(Ccx, Ccy, 4.5, "#7eb8f0", pc);
              if(pc>0.5) tagLab(Ccx, Ccy-14, `C(${AVG.toFixed(2)}, 0)`, "#7eb8f0", 9.5);
            }
            // 0.75..1 R highlight
            const pr = Math.min(1, Math.max(0,(t-0.75)/0.25));
            if(pr>0){
              ctx.save(); ctx.setLineDash([3,2]); ctx.strokeStyle="#7eb8f0"; ctx.lineWidth=1.2;
              ctx.beginPath(); ctx.moveTo(Ccx, Ccy);
              ctx.lineTo(Ccx + (Ax-Ccx)*pr, Ccy + (Ay-Ccy)*pr);
              ctx.stroke(); ctx.restore();
              if(pr>0.5){
                const mx = (Ccx+Ax)/2, my = (Ccy+Ay)/2;
                tagLab(mx+10, my, "R="+R.toFixed(2), "#7eb8f0", 9.5, "left");
              }
            }
          }
        },
        {
          title: "Step 5 — Draw the circle",
          dur: 2200,
          body: () => `Centre C = (${AVG.toFixed(3)}, 0), radius R = ${R.toFixed(3)} MPa. Trace the full circle.<br><br>
<b>Every point on the circle</b> = one orientation of the element. The circle covers all 360° (= 180° real, due to the doubling rule).
<span class="g">Three numbers (σx, σy, τxy) — entire circle. Everything else just gets read off.</span>`,
          subs: ["Tracing circle…","Almost there","Circle complete"],
          paint: (t) => {
            drawAxes(1);
            // background diameter (faded)
            ctx.save(); ctx.strokeStyle="#3a3a50"; ctx.lineWidth=1; ctx.setLineDash([2,3]);
            ctx.beginPath(); ctx.moveTo(Ax,Ay); ctx.lineTo(Bx,By); ctx.stroke(); ctx.restore();
            // trace circle starting from A's angle
            drawCirclePath(Ccx, Ccy, Rcv, angA, t, "#7eb8f0", 1.8, "rgba(30,40,60,0.28)");
            dot(Ax, Ay, 5, "#7ec87e"); tagLab(Ax+(SX>=AVG?9:-9), Ay, "A", "#7ec87e", 9.5, SX>=AVG?"left":"right");
            dot(Bx, By, 5, "#e06060"); tagLab(Bx+(SY>=AVG?9:-9), By, "B", "#e06060", 9.5, SY>=AVG?"left":"right");
            dot(Ccx, Ccy, 4, "#7eb8f0"); tagLab(Ccx, Ccy-13, "C", "#7eb8f0", 9.5);
          }
        },
        {
          title: "Step 6 — Find σ₁ and σ₂ (where τ = 0)",
          dur: 1800,
          body: () => `Where the circle <b>crosses the σ-axis</b>, τ = 0 → these are the <b>principal stresses</b>.<br>
<span class="f">σ₁ = σavg + R = ${AVG.toFixed(3)} + ${R.toFixed(3)} = ${S1.toFixed(3)} MPa</span>
<span class="f">σ₂ = σavg − R = ${AVG.toFixed(3)} − ${R.toFixed(3)} = ${S2.toFixed(3)} MPa</span>
Invariant check: σ₁ + σ₂ = ${(S1+S2).toFixed(3)} = σx + σy = ${SX+SY} ✓
<span class="g">Max & min normal stress over all orientations.</span>`,
          subs: ["Locating σ₁","Locating σ₂","Mark diameter 2R"],
          paint: (t) => {
            drawAxes(1);
            ring(Ccx, Ccy, Rcv, "#7eb8f0", 1.6);
            ctx.save(); ctx.fillStyle="rgba(30,40,60,0.25)"; ctx.beginPath(); ctx.arc(Ccx,Ccy,Rcv,0,Math.PI*2); ctx.fill(); ctx.restore();
            ctx.save(); ctx.strokeStyle="#3a4a5a"; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(Ax,Ay); ctx.lineTo(Bx,By); ctx.stroke(); ctx.restore();
            dot(Ax, Ay, 4, "#7ec87e"); dot(Bx, By, 4, "#e06060"); dot(Ccx, Ccy, 3, "#7eb8f0");
            const p1 = Math.min(1, t/0.4);
            const p2 = Math.min(1, Math.max(0,(t-0.4)/0.4));
            const p3 = Math.min(1, Math.max(0,(t-0.8)/0.2));
            if(p1>0){
              popDot(s1x, CY, 6, "#7ec87e", p1);
              if(p1>0.5) tagLab(s1x, CY-15, "σ₁="+S1.toFixed(2), "#7ec87e", 9.5);
            }
            if(p2>0){
              popDot(s2x, CY, 6, "#e06060", p2);
              if(p2>0.5) tagLab(s2x, CY-15, "σ₂="+S2.toFixed(2), "#e06060", 9.5);
            }
            if(p3>0){
              ctx.save(); ctx.strokeStyle="#5a5a40"; ctx.lineWidth=1;
              ctx.beginPath(); ctx.moveTo(s2x, CY+22); ctx.lineTo(s2x + (s1x-s2x)*p3, CY+22); ctx.stroke();
              ctx.restore();
              if(p3>0.7) tagLab((s1x+s2x)/2, CY+30, "σ₁−σ₂ = 2R", "#7a7a40", 8.5);
            }
          }
        },
        {
          title: "Step 7 — Find θp (angle to principal plane)",
          dur: 2200,
          body: () => {
            const sweepDeg = TWO_THETA_P;
            const dir = sweepDeg > 0 ? "counter-clockwise" : sweepDeg < 0 ? "clockwise" : "no rotation";
            return `On Mohr's circle the angle <b>2θp</b> is measured from <b>A</b> to the <b>σ₁ point</b> at centre C.<br>
<span class="f">2θp = ${sweepDeg.toFixed(3)}°  →  θp1 = ${TP1.toFixed(3)}°</span>
Sweep direction on the circle: <b>${dir}</b> (same direction in reality).<br>
θp2 = θp1 ${TP1<=0?"+":"−"} 90° = <b>${TP2.toFixed(3)}°</b><br><br>
<b>Doubling rule:</b> circle angle ÷ 2 = real rotation.
<span class="w">Always start from A (x-face). Halve to get the real angle.</span>`;
          },
          subs: ["Mark line C→A","Sweep 2θp arc","Reach σ₁"],
          paint: (t) => {
            drawAxes(1);
            ring(Ccx, Ccy, Rcv, "#7eb8f0", 1.5);
            ctx.save(); ctx.fillStyle="rgba(30,40,60,0.22)"; ctx.beginPath(); ctx.arc(Ccx,Ccy,Rcv,0,Math.PI*2); ctx.fill(); ctx.restore();
            dot(Bx, By, 3.5, "#e06060");
            dot(s1x, CY, 5.5, "#7ec87e");
            tagLab(s1x, CY-15, "σ₁", "#7ec87e", 10);
            dot(Ccx, Ccy, 3, "#7eb8f0");

            // 0..0.3 line C→A
            const pl = Math.min(1, t/0.3);
            drawSolidLine(Ccx, Ccy, Ax, Ay, "#c9a84c", 1.2, pl);
            popDot(Ax, Ay, 5, "#7ec87e", Math.min(1, t/0.2));
            if(t>0.15) tagLab(Ax+(SX>=AVG?10:-10), Ay+(TXY>=0?12:-12), "A (θ=0°)", "#7ec87e", 9, SX>=AVG?"left":"right");
            // 0.3..0.85 sweep
            const ps = Math.min(1, Math.max(0,(t-0.3)/0.55));
            // arc radius ~ 0.5 R for visibility; sweep from angA to angS1=0
            // direction: if TWO_THETA_P > 0 (CCW real), screen-CCW means angle decreases (because τ-down flips sign)
            // Actually with τ-down: positive τ at A → Ay > Ccy → angA > 0. Going to angS1=0 means decreasing angle = screen-CCW. That matches CCW real (TWO_THETA_P>0 when TXY<0? let's reason)
            // Easier: compute sign from TWO_THETA_P, sweep proportionally.
            const totalSweepRad = TWO_THETA_P * Math.PI / 180; // signed
            // We want to start at A on circle and sweep by -totalSweepRad in screen radians (because τ-down flips sign)
            // Verify: TXY>0 → A is below axis → angA>0. CCW-real should rotate to σ1 going CCW screen too? With τ-down, math is: a_screen = -2θ_real shift from A. So end angle screen = angA - totalSweepRad? Let's pick that.
            const endA = 0; // σ1 is at angle 0
            // We'll just animate from angA to endA along the shortest arc in the correct direction.
            // Shortest arc direction: if angA > 0 (A below axis, TXY>0), go CCW (decrease angle). If angA<0, go CW (increase angle).
            const ccw = angA > 0;
            const sweepTotal = ccw ? -angA : -angA; // ends at 0 either way
            const a = angA + sweepTotal * ps;
            // Draw line from C to current point (rotating)
            const cpx = Ccx + Rcv * Math.cos(a);
            const cpy = Ccy + Rcv * Math.sin(a);
            ctx.save(); ctx.strokeStyle="rgba(201,168,76,0.6)"; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(Ccx, Ccy); ctx.lineTo(cpx, cpy); ctx.stroke();
            ctx.restore();
            // Arc trail
            ctx.save(); ctx.strokeStyle="#c9a84c"; ctx.lineWidth=1.6; ctx.setLineDash([3,2]);
            ctx.beginPath();
            ctx.arc(Ccx, Ccy, Rcv*0.45, angA, a, ccw);
            ctx.stroke(); ctx.restore();
            // moving green pen
            dot(cpx, cpy, 3.5, "#c9a84c");
            // label at midpoint
            if(ps>0.25){
              const mid = angA + sweepTotal * 0.5;
              const lx = Ccx + Rcv*0.6 * Math.cos(mid);
              const ly = Ccy + Rcv*0.6 * Math.sin(mid);
              tagLab(lx, ly, "2θp = "+TWO_THETA_P.toFixed(1)+"°", "#c9a84c", 9);
            }
          }
        },
        {
          title: "Step 8 — τmax: top & bottom of circle",
          dur: 1800,
          body: () => `The <b>top and bottom</b> of the circle give <b>τmax = R = ${R.toFixed(3)} MPa</b>.<br>
On the circle they are 90° from σ₁ → <b>45° in reality</b>.<br><br>
<span class="f">θs1 = θp1 ± 45° (shorter rotation) = ${TS1.toFixed(3)}°</span>
At these orientations σ = σavg = <b>${AVG.toFixed(3)} MPa</b> on both faces (not zero!).
<span class="g">τmax = R. The radius of Mohr's circle <i>is</i> the maximum shear.</span>`,
          subs: ["Mark top point","Mark bottom point","Connect"],
          paint: (t) => {
            drawAxes(1);
            ring(Ccx, Ccy, Rcv, "#7eb8f0", 1.5);
            ctx.save(); ctx.fillStyle="rgba(30,40,60,0.22)"; ctx.beginPath(); ctx.arc(Ccx,Ccy,Rcv,0,Math.PI*2); ctx.fill(); ctx.restore();
            dot(Ax, Ay, 4, "#7ec87e"); dot(Bx, By, 4, "#e06060");
            dot(s1x, CY, 5, "#7ec87e"); dot(s2x, CY, 5, "#e06060");
            tagLab(s1x, CY-13, "σ₁", "#7ec87e", 9);
            tagLab(s2x, CY-13, "σ₂", "#e06060", 9);
            dot(Ccx, Ccy, 3, "#7eb8f0");

            const p1 = Math.min(1, t/0.4);
            const p2 = Math.min(1, Math.max(0,(t-0.4)/0.4));
            const p3 = Math.min(1, Math.max(0,(t-0.75)/0.25));
            if(p1>0){
              popDot(Ccx, CY-Rcv, 6, "#c9a84c", p1);
              if(p1>0.5) tagLab(Ccx, CY-Rcv-14, "τmax = "+R.toFixed(2), "#c9a84c", 9.5);
            }
            if(p2>0){
              popDot(Ccx, CY+Rcv, 6, "#c9a84c", p2);
              if(p2>0.5) tagLab(Ccx, CY+Rcv+14, "−τmax", "#c9a84c", 9.5);
            }
            if(p3>0){
              ctx.save(); ctx.strokeStyle="#c9a84c"; ctx.lineWidth=1; ctx.setLineDash([3,2]);
              ctx.beginPath(); ctx.moveTo(Ccx, CY-Rcv);
              ctx.lineTo(Ccx, CY-Rcv + 2*Rcv*p3); ctx.stroke(); ctx.restore();
              if(p3>0.7) tagLab(Ccx + Rcv*0.55, CY, "θs1 = "+TS1.toFixed(2)+"°", "#c9a84c", 9, "left");
            }
          }
        },
        {
          title: "Step 9 — Read any plane: rotate around the circle",
          dur: 3200,
          body: () => `For an arbitrary angle θ from the x-axis:<br>
1. Start at A (θ=0°). 2. Rotate by <b>2θ</b> around the circle. 3. Read (σ, τ).<br><br>
Watch a point traverse the whole circle below — it visits every possible orientation.
<span class="g">One diagram, every orientation. That's the entire point of Mohr's circle.</span>`,
          subs: ["Rotating around circle","All orientations","Complete"],
          paint: (t) => {
            drawAxes(1);
            ring(Ccx, Ccy, Rcv, "#7eb8f0", 1.6);
            ctx.save(); ctx.fillStyle="rgba(30,40,60,0.22)"; ctx.beginPath(); ctx.arc(Ccx,Ccy,Rcv,0,Math.PI*2); ctx.fill(); ctx.restore();
            // markers
            dot(Ax, Ay, 4, "#7ec87e"); tagLab(Ax+(SX>=AVG?9:-9), Ay, "A", "#7ec87e", 9, SX>=AVG?"left":"right");
            dot(Bx, By, 4, "#e06060"); tagLab(Bx+(SY>=AVG?9:-9), By, "B", "#e06060", 9, SY>=AVG?"left":"right");
            dot(s1x, CY, 5, "#7ec87e"); tagLab(s1x, CY-13, "σ₁", "#7ec87e", 9);
            dot(s2x, CY, 5, "#e06060"); tagLab(s2x, CY-13, "σ₂", "#e06060", 9);
            dot(Ccx, CY-Rcv, 4, "#c9a84c"); dot(Ccx, CY+Rcv, 4, "#c9a84c");
            dot(Ccx, Ccy, 3, "#7eb8f0");
            // moving point — full revolution
            const a = angA - Math.PI*2*t; // CCW screen
            const px = Ccx + Rcv*Math.cos(a);
            const py = Ccy + Rcv*Math.sin(a);
            // trail
            ctx.save(); ctx.strokeStyle="rgba(201,168,76,0.55)"; ctx.lineWidth=1.4;
            ctx.beginPath(); ctx.arc(Ccx, Ccy, Rcv, angA, a, true); ctx.stroke(); ctx.restore();
            // diameter to current point
            ctx.save(); ctx.strokeStyle="#c9a84c"; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(Ccx, Ccy); ctx.lineTo(px, py); ctx.stroke(); ctx.restore();
            dot(px, py, 5, "#c9a84c");
            // current σ, τ readout
            const σnow = AVG + (px - Ccx)/SCALE;
            const τnow = (py - CY)/SCALE;
            const θreal = (-(a - angA) * 180/Math.PI) / 2;
            tagLab(px + (px>Ccx?10:-10), py + (py>Ccy?12:-12),
                   `θ=${θreal.toFixed(0)}°  (σ=${σnow.toFixed(1)}, τ=${τnow.toFixed(1)})`,
                   "#c9a84c", 9, px>Ccx?"left":"right");
          }
        }
      ];

      // ── Animation engine ──────────────────────────────────────────────
      let stepIdx = 0, animRAF = null, animStart = 0, autoT = null, animDone = false;

      function runAnim(){
        cancelAnimationFrame(animRAF);
        const step = STEPS[stepIdx];
        animStart = performance.now();
        animDone = false;
        function frame(now){
          const elapsed = now - animStart;
          const t = Math.min(1, elapsed / step.dur);
          step.paint(t);
          // sub-step text
          if(step.subs){
            const idx = Math.min(step.subs.length-1, Math.floor(t * step.subs.length));
            document.getElementById("subText").innerHTML =
              `<b>${idx+1}/${step.subs.length}</b> · ${step.subs[idx]}`;
          }
          if(t < 1){ animRAF = requestAnimationFrame(frame); }
          else { animDone = true; }
        }
        animRAF = requestAnimationFrame(frame);
      }

      function showStep(i){
        stepIdx = Math.max(0, Math.min(i, STEPS.length-1));
        const s = STEPS[stepIdx];
        document.getElementById("exTitle").textContent = s.title;
        document.getElementById("exBody").innerHTML = s.body();
        document.getElementById("progFill").style.width = ((stepIdx+1)/STEPS.length*100)+"%";
        document.querySelectorAll(".step-btn").forEach((b,bi) => {
          b.classList.toggle("active", bi===stepIdx);
          b.classList.toggle("done", bi<stepIdx);
        });
        document.getElementById("btnPrev").disabled = stepIdx===0;
        document.getElementById("btnNext").disabled = stepIdx===STEPS.length-1;
        runAnim();
      }
      function next(){ if(stepIdx<STEPS.length-1) showStep(stepIdx+1); }
      function prev(){ if(stepIdx>0) showStep(stepIdx-1); }
      function replay(){ runAnim(); }
      function autoPlay(){
        if(autoT){ clearTimeout(autoT); autoT=null; document.getElementById("btnAuto").textContent="▶ Auto-play"; return; }
        document.getElementById("btnAuto").textContent="⏸ Stop";
        let i = stepIdx;
        function go(){
          if(i >= STEPS.length){ autoT=null; document.getElementById("btnAuto").textContent="▶ Auto-play"; return; }
          showStep(i);
          const dur = STEPS[i].dur + 1500;
          i++;
          autoT = setTimeout(go, dur);
        }
        go();
      }

      // ── Build step buttons ────────────────────────────────────────────
      const sb = document.getElementById("stepBtns");
      STEPS.forEach((s,i) => {
        const b = document.createElement("button");
        b.className="step-btn";
        const short = s.title.replace(/Step \d+ — /, "").substring(0, 22);
        b.innerHTML = `<span style="font-size:9px;opacity:0.4;display:block">Step ${i+1}</span>${short}`;
        b.onclick = () => { if(autoT){ clearTimeout(autoT); autoT=null; document.getElementById("btnAuto").textContent="▶ Auto-play";} showStep(i); };
        sb.appendChild(b);
      });
      showStep(0);
    </script>
  </body>
</html>
